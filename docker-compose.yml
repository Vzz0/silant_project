version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=silant_db
      - POSTGRES_USER=silant_user
      - POSTGRES_PASSWORD=silant_pass

  web:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://silant_user:silant_pass@db:5432/silant_db
    depends_on:
      - db

volumes:
  postgres_data: